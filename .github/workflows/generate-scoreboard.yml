name: CME Scoreboard

on:
  schedule:
    - cron: '0 6,18 * * *'   # 2x per day — 6am and 6pm UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-scoreboard:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements.txt
      - run: python generate_scoreboard.py
        env:
          PYTHONUNBUFFERED: '1'
      - run: |
          git config user.name "Scoreboard Bot"
          git config user.email "actions@github.com"
          git add output/ || true
          git diff --staged --quiet || git commit -m "scoreboard: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase --autostash origin main
          git push
